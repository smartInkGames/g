<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بصمتي الصغيرة - نسخة الآيباد والهاتف</title>
    <style>
        :root {
            --primary: #4A90E2;
            --accent: #FF8A80;
            --dark: #37474F;
            --light: #F5F7FA;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
            touch-action: none; /* يمنع اهتزاز الشاشة أثناء التلوين بالآيباد */
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ECEFF1, #CFD8DC);
            color: var(--dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            padding-bottom: 10px;
        }

        header {
            background: linear-gradient(135deg, #FFB74D, #FF8A65);
            width: 100%;
            padding: 8px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            color: white;
        }

        header h1 { font-size: 20px; font-weight: bold; }
        header p { font-size: 12px; opacity: 0.9; }

        /* شريط أدوات مرن ومتناسق مع شاشات الهواتف والآيباد */
        .toolbar {
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            padding: 8px 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 20px rgba(0,0,0,0.08);
            margin: 10px 0;
            width: 95%;
            max-width: 600px;
        }

        .btn {
            background-color: var(--light);
            border: 2px solid #CFD8DC;
            border-radius: 8px;
            padding: 6px 12px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            color: var(--dark);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .btn.active { background-color: var(--primary); color: white; border-color: var(--primary); }
        .btn-audio { background-color: #9C27B0; color: white; border-color: #9C27B0; }

        .color-section {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #ECEFF1;
            padding: 2px 10px;
            border-radius: 20px;
        }

        .native-color-picker {
            width: 28px;
            height: 28px;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            background: none;
        }

        /* حاوية العرض المستقيمة تماماً المناسبة للمس */
        .scene-container {
            width: 90%;
            max-width: 400px; 
            height: 520px; 
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 5px;
        }

        .flat-book {
            width: 100%;
            height: 100%;
            position: relative;
            background-color: #FFFFFF;
            box-shadow: 0 10px 25px rgba(0,0,0,0.25), inset 5px 0 8px rgba(0,0,0,0.15);
            border-radius: 4px 10px 10px 4px;
            overflow: hidden;
        }

        .page-content-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .page-img {
            width: 100%;
            height: 100%;
            object-fit: fill;
            pointer-events: none;
            position: absolute;
        }

        .book-spine-line {
            position: absolute;
            top: 0;
            right: 4px;
            width: 6px;
            height: 100%;
            background: linear-gradient(to left, rgba(0,0,0,0.15), rgba(0,0,0,0));
            z-index: 20;
            pointer-events: none;
        }

        .drawing-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
        }

        .status-footer {
            margin-top: 10px;
            font-size: 13px;
            font-weight: bold;
            color: #37474F;
            background: white;
            padding: 4px 12px;
            border-radius: 20px;
        }
    </style>
</head>
<body>

    <header>
        <h1>بصمتي الصغيرة 📖✨</h1>
        <p>نسخة الهاتف والآيباد المحدثة - اسحبي لتقليب الصفحات ولوّني باللمس</p>
    </header>

    <!-- التأكد من كتابة اسم أنشودتك بشكل صحيح هنا -->
    <audio id="bg-audio" src="alphabet-song.mp3" loop></audio>

    <div class="toolbar">
        <button class="btn active" id="tool-pencil" onclick="setTool('pencil')">✏️ بنسل</button>
        <button class="btn" id="tool-brush" onclick="setTool('brush')">🖌️ فرشاة</button>
        <button class="btn" id="tool-eraser" onclick="setTool('eraser')">🧽 ممحاة</button>
        
        <div class="color-section">
            <label style="font-size:11px; font-weight:bold;">🎨 الألوان:</label>
            <input type="color" id="html-picker" class="native-color-picker" value="#212121" onchange="setAdvancedColor(this.value)">
        </div>

        <button class="btn btn-audio" id="btn-audio" onclick="toggleAudio()">🎵 الأنشودة</button>
        <button class="btn" onclick="clearCurrentCanvas()" style="border-color: var(--accent); color: #D32F2F;">🗑️ مسح</button>
    </div>

    <div class="scene-container">
        <div class="flat-book" id="book-element">
            <div class="book-spine-line"></div>
            <div class="page-content-wrapper">
                <!-- تنبيه مهم: تأكدي أن امتداد الصور في مجلدك هو png بحروف صغيرة -->
                <img id="current-page-img" src="page1.png" class="page-img" alt="صفحة الكتاب">
                <canvas id="main-canvas" class="drawing-canvas"></canvas>
            </div>
        </div>
    </div>

    <div class="status-footer" id="page-indicator">
        الصفحة الحالية: 1 من 32
    </div>

    <script>
        const totalPages = 32;
        let currentPage = 1;
        let isDrawing = false;
        let currentTool = 'pencil';
        let currentColor = '#212121';
        let lastX = 0; let lastY = 0;

        let touchStartX = 0;
        let touchStartY = 0;

        const canvas = document.getElementById('main-canvas');
        const ctx = canvas.getContext('2d');
        const pageImg = document.getElementById('current-page-img');
        const audio = document.getElementById('bg-audio');
        const audioBtn = document.getElementById('btn-audio');

        const savedDrawings = {};

        function initCanvas() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            loadCanvasData();
        }

        function updateBookPage() {
            // تحويل اسم الصفحة برمجياً ليتوافق مع الملفات المرفوعة
            pageImg.src = page${currentPage}.png;
            document.getElementById('page-indicator').textContent = الصفحة الحالية: ${currentPage} من ${totalPages};
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            loadCanvasData();
        }

        // --- دعم أحداث اللمس للأجهزة الذكية والآيباد بالكامل ---
        canvas.addEventListener('touchstart', (e) => {
            isDrawing = true;
            const coords = getCoords(e, true);
            lastX = coords.x; lastY = coords.y;

            if (e.touches.length === 1) {
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
            }
        });

        canvas.addEventListener('touchmove', (e) => {
            if (!isDrawing) return;
            const coords = getCoords(e, true);

            if (e.touches.length === 1) {
                const diffX = e.touches[0].clientX - touchStartX;
                const diffY = e.touches[0].clientY - touchStartY;

                // إذا قام الطفل بسحب أفقي طويل يتم تقليب الصفحة فوراً
                if (Math.abs(diffX) > 90 && Math.abs(diffY) < 40) {
                    isDrawing = false;
                    if (diffX < 0) nextPage(); else prevPage();
                    return;
                }
            }

            drawOnCanvas(coords.x, coords.y);
        });

        canvas.addEventListener('touchend', () => { isDrawing = false; saveCanvasData(); });

        // --- دعم الماوس للكمبيوتر احتياطاً ---
        canvas.addEventListener('mousedown', (e) => { isDrawing = true; const coords = getCoords(e, false); lastX = coords.x; lastY = coords.y; });
        canvas.addEventListener('mousemove', (e) => { if (isDrawing) { const coords = getCoords(e, false); drawOnCanvas(coords.x, coords.y); } });
        canvas.addEventListener('mouseup', () => { isDrawing = false; saveCanvasData(); });

        function drawOnCanvas(x, y) {
            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(x, y);

            if (currentTool === 'eraser') {
                ctx.globalCompositeOperation = 'destination-out';
                ctx.lineWidth = 30;
            } else {
                ctx.globalCompositeOperation = 'source-over';
                ctx.strokeStyle = currentColor;
                ctx.lineWidth = currentTool === 'brush' ? 12 : 3;
            }

            ctx.stroke();
            lastX = x; lastY = y;
        }

        function saveCanvasData() {
            savedDrawings[currentPage] = canvas.toDataURL();
        }

        function loadCanvasData() {
            if (savedDrawings[currentPage]) {
                const img = new Image();
                img.src = savedDrawings[currentPage];
                img.onload = () => ctx.drawImage(img, 0, 0);
            }
        }

        function getCoords(e, isTouch) {
            const rect = canvas.getBoundingClientRect();
            let clientX = isTouch ? e.touches[0].clientX : e.clientX;
            let clientY = isTouch ? e.touches[0].clientY : e.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        function nextPage() { if (currentPage < totalPages) { currentPage++; updateBookPage(); } }
        function prevPage() { if (currentPage > 1) { currentPage--; updateBookPage(); } }

        function setTool(tool) {
            currentTool = tool;
            document.querySelectorAll('.toolbar .btn').forEach(b => {
                if(b.id === 'tool-' + tool) b.classList.add('active');
                else b.classList.remove('active');
            });
        }

        function setAdvancedColor(color) {
            currentColor = color;
            if(currentTool === 'eraser') setTool('brush');
        }

        function clearCurrentCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            delete savedDrawings[currentPage];
        }

        function toggleAudio() {
            if (audio.paused) {
                audio.play().then(() => { audioBtn.textContent = "⏸️ إيقاف الأنشودة"; })
                .catch(() => { alert("اضغطي على الشاشة أولاً لتنشيط الصوت في متصفح الآيباد!"); });
            } else {
                audio.pause(); audioBtn.textContent = "🎵 الأنشودة";
            }
        }

        window.addEventListener('load', () => { initCanvas(); });
        window.addEventListener('resize', () => { initCanvas(); });
    </script>
</body>
</html>
